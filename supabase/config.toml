project_id = "lumimar-homes"

[api]
enabled = true
port = 54321
schemas = ["public", "lumimar", "storage", "graphql_public"]
extra_search_path = ["public", "lumimar", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000", "http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
policy = "oneshot"

[functions.submit-owner-lead]
verify_jwt = false

[functions.invite-owner]
verify_jwt = true
